services:
  postgres:
    image: postgres:17
    container_name: multilot-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: ${LOCAL_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${LOCAL_DB_DATABASE:-multilot360}
    ports:
      - '${LOCAL_DB_PORT:-54329}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: multilot-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
      - '${REDIS_INSIGHT_PORT:-8001}:8001'
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-multilot_redis_dev} --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
